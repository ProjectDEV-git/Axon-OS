<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the Brain service name -->
  <policy user="${user}">
    <allow own="org.axonos.Brain"/>
  </policy>

  <!-- Any process in the session can call Brain methods -->
  <policy context="default">
    <allow send_destination="org.axonos.Brain"/>
    <allow receive_sender="org.axonos.Brain"/>
    <!-- Prevent eavesdropping on Brain responses -->
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
