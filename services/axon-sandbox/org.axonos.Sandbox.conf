<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the Sandbox service name -->
  <policy user="${user}">
    <allow own="org.axonos.Sandbox"/>
    <!-- Session user may call all Sandbox methods -->
    <allow send_destination="org.axonos.Sandbox"/>
  </policy>

  <!-- Default policy: allow status, restrict sandbox control methods -->
  <policy context="default">
    <allow send_destination="org.axonos.Sandbox" send_member="GetStatus"/>

    <!-- Restrict sandbox management to authorized callers
         (org.axonos.Brain, org.axonos.GuiAgent). -->
    <deny send_destination="org.axonos.Sandbox" send_member="AuditAndPrompt"/>
    <deny send_destination="org.axonos.Sandbox" send_member="SandboxRun"/>
    <deny send_destination="org.axonos.Sandbox" send_member="ShieldStatus"/>
    <deny send_destination="org.axonos.Sandbox" send_member="EnableShield"/>
    <deny send_destination="org.axonos.Sandbox" send_member="DisableShield"/>

    <allow receive_sender="org.axonos.Sandbox"/>
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
