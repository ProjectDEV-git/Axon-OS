<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the Context service name -->
  <policy user="${user}">
    <allow own="org.axonos.Context"/>
    <!-- Session user may call all Context methods -->
    <allow send_destination="org.axonos.Context"/>
  </policy>

  <!-- Default policy: allow reads, restrict context mutation methods -->
  <policy context="default">
    <allow send_destination="org.axonos.Context" send_member="GetSnapshot"/>
    <allow send_destination="org.axonos.Context" send_member="GetStatus"/>

    <!-- Restrict context mutation methods to authorized callers
         (org.axonos.Brain, org.axonos.GuiAgent). -->
    <deny send_destination="org.axonos.Context" send_member="UpdateSnapshot"/>
    <deny send_destination="org.axonos.Context" send_member="ClearCache"/>
    <deny send_destination="org.axonos.Context" send_member="SetWatchPaths"/>

    <allow receive_sender="org.axonos.Context"/>
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
