name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New semver version (e.g. 0.2.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Bump version
        run: |
          python scripts/bump_version.py ${{ github.event.inputs.version }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pyproject.toml DEVELOPING.md || true
          git commit -m "chore(release): bump version to ${{ github.event.inputs.version }}" || echo "No changes to commit"

      - name: Create tag and push
        run: |
          git tag -a v${{ github.event.inputs.version }} -m "Release ${{ github.event.inputs.version }}"
          git push origin HEAD:main
          git push origin --tags

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: v${{ github.event.inputs.version }}
          body: "Automated release for version ${{ github.event.inputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
