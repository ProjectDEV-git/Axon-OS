<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the Search service name -->
  <policy user="${user}">
    <allow own="org.axonos.Search"/>
    <!-- Session user may call all Search methods -->
    <allow send_destination="org.axonos.Search"/>
  </policy>

  <!-- Default policy: allow queries, restrict indexing methods -->
  <policy context="default">
    <allow send_destination="org.axonos.Search" send_member="Query"/>
    <allow send_destination="org.axonos.Search" send_member="GetStatus"/>

    <!-- Restrict indexing/content methods to authorized callers -->
    <deny send_destination="org.axonos.Search" send_member="IndexDirectory"/>
    <deny send_destination="org.axonos.Search" send_member="ReindexAll"/>
    <deny send_destination="org.axonos.Search" send_member="DeleteIndex"/>

    <allow receive_sender="org.axonos.Search"/>
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
