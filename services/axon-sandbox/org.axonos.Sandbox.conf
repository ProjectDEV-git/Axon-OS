<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the Sandbox service name -->
  <policy user="${user}">
    <allow own="org.axonos.Sandbox"/>
  </policy>

  <!-- Any process in the session can call Sandbox methods -->
  <policy context="default">
    <allow send_destination="org.axonos.Sandbox"/>
    <allow receive_sender="org.axonos.Sandbox"/>
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
