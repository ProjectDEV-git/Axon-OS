<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the GuiAgent service name -->
  <policy user="${user}">
    <allow own="org.axonos.GuiAgent"/>
    <!-- Session user may call all GuiAgent methods -->
    <allow send_destination="org.axonos.GuiAgent"/>
  </policy>

  <!-- Default policy: allow status, restrict GUI automation methods -->
  <policy context="default">
    <allow send_destination="org.axonos.GuiAgent" send_member="GetStatus"/>

    <!-- Restrict GUI automation methods to authorized callers
         (org.axonos.Brain, org.axonos.IntentBar). -->
    <deny send_destination="org.axonos.GuiAgent" send_member="Click"/>
    <deny send_destination="org.axonos.GuiAgent" send_member="Type"/>
    <deny send_destination="org.axonos.GuiAgent" send_member="Screenshot"/>
    <deny send_destination="org.axonos.GuiAgent" send_member="GetActiveWindow"/>
    <deny send_destination="org.axonos.GuiAgent" send_member="ListWindows"/>

    <allow receive_sender="org.axonos.GuiAgent"/>
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
