<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the Voice service name -->
  <policy user="${user}">
    <allow own="org.axonos.Voice"/>
    <!-- Session user may call all Voice methods -->
    <allow send_destination="org.axonos.Voice"/>
  </policy>

  <!-- Default policy: allow status methods, restrict active voice methods -->
  <policy context="default">
    <allow send_destination="org.axonos.Voice" send_member="GetStatus"/>

    <!-- Restrict voice interaction methods to authorized callers
         (org.axonos.IntentBar, org.axonos.GuiAgent). -->
    <deny send_destination="org.axonos.Voice" send_member="StartListening"/>
    <deny send_destination="org.axonos.Voice" send_member="StopListening"/>
    <deny send_destination="org.axonos.Voice" send_member="SendVoiceCommand"/>
    <deny send_destination="org.axonos.Voice" send_member="SetWakeWord"/>
    <deny send_destination="org.axonos.Voice" send_member="PullTTSModel"/>

    <allow receive_sender="org.axonos.Voice"/>
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
