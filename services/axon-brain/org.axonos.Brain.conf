<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the session user can own the Brain service name -->
  <policy user="${user}">
    <allow own="org.axonos.Brain"/>
    <!-- Session user may call all Brain methods -->
    <allow send_destination="org.axonos.Brain"/>
  </policy>

  <!-- Default policy: allow read-only methods, restrict state-changing methods -->
  <policy context="default">
    <!-- Read-only methods open to all session processes -->
    <allow send_destination="org.axonos.Brain" send_member="GetStatus"/>
    <allow send_destination="org.axonos.Brain" send_member="ListModels"/>
    <allow send_destination="org.axonos.Brain" send_member="ListConversations"/>
    <allow send_destination="org.axonos.Brain" send_member="GetMessages"/>
    <allow send_destination="org.axonos.Brain" send_member="GetEmbeddings"/>

    <!-- Restrict sensitive methods to authorized callers (org.axonos.IntentBar,
         org.axonos.VoiceService, org.axonos.AIPanel, org.axonos.GuiAgent).
         D-Bus session policy cannot match by sender bus name, so these are
         denied by default and allowed only for the session user above.
         Application-level caller verification is recommended as defense-in-depth. -->
    <deny send_destination="org.axonos.Brain" send_member="SendMessage"/>
    <deny send_destination="org.axonos.Brain" send_member="ClassifyIntent"/>
    <deny send_destination="org.axonos.Brain" send_member="Generate"/>
    <deny send_destination="org.axonos.Brain" send_member="ClassifyWindow"/>
    <deny send_destination="org.axonos.Brain" send_member="PullModel"/>
    <deny send_destination="org.axonos.Brain" send_member="CreateConversation"/>
    <deny send_destination="org.axonos.Brain" send_member="AddMessage"/>
    <deny send_destination="org.axonos.Brain" send_member="UpdateTitle"/>
    <deny send_destination="org.axonos.Brain" send_member="DeleteConversation"/>

    <allow receive_sender="org.axonos.Brain"/>
    <!-- Prevent eavesdropping on Brain responses -->
    <deny eavesdrop="true"/>
  </policy>
</busconfig>
